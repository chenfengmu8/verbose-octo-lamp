<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:title" content="私人資料庫">
    <meta property="og:description" content="本連結僅供內部人員使用">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>興達工安文件資源庫</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            /* 定義水態玻璃變數，方便統一修改 */
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            /* 背景稍微增加色彩細節，能讓水態玻璃效果更明顯 */
            background: linear-gradient(135deg, #cfd9df 0%, #e2ebf0 100%);
            background-attachment: fixed; 
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px; /* 手機端邊距縮小，增加可視空間 */
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        header h1 {
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            font-size: 1.8rem; /* 手機端標題優化 */
        }

/* 1. 搜尋框外部容器：負責定位與手機間距 */
        .search-box {
            margin-bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 0 20px; /* 增加手機端左右緩衝 */
            box-sizing: border-box;
        }

        /* 2. 輸入框本體：實踐水態玻璃效果 */
        .search-box input {
            /* 寬度適配：手機 90%，電腦最大 400px */
            width: 100%;
            max-width: 400px; 
            
            /* 核心：水態玻璃樣式 */
            background: rgba(255, 255, 255, 0.3); /* 更通透的半透明白 */
            backdrop-filter: blur(15px); /* 稍微加強模糊感，更有高級感 */
            -webkit-backdrop-filter: blur(15px);
            
            /* 邊框與光澤 */
            border: 1px solid rgba(255, 255, 255, 0.5); /* 亮色邊框模擬玻璃邊緣 */
            border-radius: 50px; /* 膠囊狀圓角更現代 */
            
            padding: 14px 22px;
            font-size: 16px; /* 防止 iOS 點擊自動放大畫面 */
            color: #1e293b;
            outline: none;
            
            /* 陰影優化：柔和的懸浮感 */
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            
            /* 平滑動畫 */
            transition: all 0.3s ease;
        }

        /* 3. 聚焦效果：增加互動光澤感 */
        .search-box input:focus {
            background: rgba(255, 255, 255, 0.5); /* 聚焦時變亮一點 */
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(37, 99, 235, 0.15); /* 稍微帶點藍色的發光感 */
            transform: translateY(-2px); /* 輕微上浮 */
        }

        /* 修正 Placeholder 文字顏色，讓它在玻璃背景下更清晰 */
        .search-box input::placeholder {
            color: rgba(30, 41, 59, 0.5);
        }
        
        .grid {
            display: grid;
            /* 關鍵：使用 auto-fill 與 minmax 實現手機與電腦自動換列 */
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        /* 電腦端 hover 效果，手機端會忽略或點擊觸發 */
        @media (min-width: 769px) {
            .card:hover {
                transform: translateY(-8px) scale(1.02);
                background: rgba(255, 255, 255, 0.55);
                box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
                border: 1px solid rgba(255, 255, 255, 0.8);
            }
        }

        .file-icon {
            font-size: 44px;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .file-name {
            font-size: 1.05rem;
            color: var(--text-dark);
            font-weight: 600;
            margin-bottom: 18px;
            line-height: 1.4;
            /* 關鍵：防止長檔名在手機上撐破卡片，超過兩行自動縮略 */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-all;
        }

        .download-btn {
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 14px 0;
            border-radius: 16px;
            font-size: 0.95rem;
            font-weight: bold;
            transition: 0.3s;
            display: block;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .download-btn:active {
            transform: scale(0.97); /* 手機端點擊回饋 */
        }

        .update-tag {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 15px;
        }

        .no-result {
            text-align: center;
            color: #64748b;
            margin-top: 30px;
            display: none;
            font-size: 1.1rem;
        }

        footer {
            margin-top: 40px;
            padding: 20px 0;
            color: #94a3b8;
            font-size: 0.75rem;
        }

        /* 針對窄螢幕手機的微調 */
        @media (max-width: 360px) {
            .grid {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>興達工安文件資源庫</h1>
    <p>請搜尋並下載最新版本文件</p>
</header>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="搜尋文件 (中文/英文)...">
</div>

<div class="grid" id="fileGrid">
    <p style="text-align: center; grid-column: 1/-1;">正在載入文件列表...</p>
</div>

<div class="no-result" id="noResult">查無符合的文件</div>

<footer>By C.F.M </footer>

<script>
// 1. 從 data.json 獲取資料
fetch('data.json')
    .then(response => {
        if (!response.ok) throw new Error('無法讀取 data.json');
        return response.json();
    })
    .then(data => {
        const container = document.getElementById('fileGrid');
        container.innerHTML = ''; // 清除「載入中」文字

        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div>
                    <div class="file-icon">📄</div>
                    <div class="file-name">${item.name}</div>
                </div>
                <div>
                    <a href="${item.file}" download class="download-btn">下載文件</a>
                    <div class="update-tag">最後更新：${item.date}</div>
                </div>
            `;
            container.appendChild(card);
        });

        // 載入完成後開啟搜尋監聽
        initSearch();
    })
    .catch(error => {
        console.error('Error:', error);
        document.getElementById('fileGrid').innerHTML = '<p style="color:red; text-align:center; grid-column:1/-1;">資料載入出錯，請檢查 data.json 格式或路徑。</p>';
    });

// 2. 搜尋功能邏輯 (支援中文與英文大小寫)
function initSearch() {
    const searchInput = document.getElementById("searchInput");
    const noResult = document.getElementById("noResult");

    searchInput.addEventListener("keyup", function () {
        // 將關鍵字轉為小寫，確保搜尋英文時不分大小寫
        const keyword = this.value.toLowerCase(); 
        const cards = document.querySelectorAll(".card");
        let visibleCount = 0;

        cards.forEach(card => {
            // 將檔名也轉為小寫進行比對
            const fileName = card.querySelector(".file-name").innerText.toLowerCase();
            
            // 比對關鍵字是否包含在檔名中
            if (fileName.includes(keyword)) {
                card.style.display = "flex";
                visibleCount++;
            } else {
                card.style.display = "none";
            }
        });

        noResult.style.display = visibleCount === 0 ? "block" : "none";
    });
}
</script>

</body>
</html>
