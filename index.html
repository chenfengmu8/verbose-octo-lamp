<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:title" content="私人資料庫">
    <meta property="og:description" content="本連結僅供內部人員使用">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>興達工安文件資源庫</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;            
            --glass-bg: rgba(255, 255, 255, 0.3);
            --glass-border: rgba(255, 255, 255, 0.5);
            --text-dark: #1e293b;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #cfd9df 0%, #e2ebf0 100%);
            background-attachment: fixed; 
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        header h1 {
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }

        .search-box {
            margin-bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 0 20px;
            box-sizing: border-box;
        }
       
        .search-box input {
            width: 100%;
            max-width: 400px;               
            background: rgba(255, 255, 255, 0.3); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);      
            border: 1px solid rgba(255, 255, 255, 0.5); 
            border-radius: 50px;            
            padding: 14px 22px;
            font-size: 16px; 
            color: #1e293b;
            outline: none;                      
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);          
            transition: all 0.3s ease;
        }
        
        .search-box input:focus {
            background: rgba(255, 255, 255, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px 0 rgba(37, 99, 235, 0.15); 
            transform: translateY(-2px); 
        }
     
        .search-box input::placeholder {
            color: rgba(30, 41, 59, 0.5);
        }
        
        .grid {
            display: grid;            
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1100px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
    
        @media (min-width: 769px) {
            .card:hover {
                transform: translateY(-8px) scale(1.02);
                background: rgba(255, 255, 255, 0.55);
                box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
                border: 1px solid rgba(255, 255, 255, 0.8);
            }
        }

        .file-icon {
            font-size: 44px;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .file-name {
            font-size: 1.05rem;
            color: var(--text-dark);
            font-weight: 600;
            margin-bottom: 18px;
            line-height: 1.4;
            position: relative;
            cursor: help;
            display: inline-block; /* 確保寬度符合文字 */
        }
        
        /* 預覽視窗樣式 */
        .preview-box {
            display: none;
            position: absolute;
            bottom: 115%;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            padding: 8px;
            z-index: 100;
            pointer-events: none;
            border: 1px solid var(--glass-border);
        }

        .preview-box img {
            width: 100%;
            border-radius: 8px;
            display: block;
        }

        .file-name:hover .preview-box {
            display: block;
            animation: fadeIn 0.3s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .download-btn {
            display: block;         
            width: 60%;             
            max-width: 200px;        
            margin: 15px auto 0;     
            box-sizing: border-box; 
            text-align: center;     
            background: rgba(37, 99, 235, 0.85); 
            backdrop-filter: blur(4px);
            color: white;
            text-decoration: none;
            padding: 8px 8PX;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .download-btn:hover {
            background: #1d4ed8;
            box-shadow: 0 5px 15px rgba(37, 99, 235, 0.4); 
        }

        .update-tag {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 15px;
        }

        .no-result {
            text-align: center;
            color: #64748b;
            margin-top: 30px;
            display: none;
            font-size: 1.1rem;
        }

        footer {
            margin-top: auto;
            padding: 20px 0;
            color: #94a3b8;
            font-size: 0.75rem;
        }

        /* 手機端與小螢幕優化 */
        @media (max-width: 768px) {
            .preview-box { display: none !important; } /* 手機端停用預覽 */
            .download-btn { width: 100%; }
        }

        @media (max-width: 360px) {
            .grid {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>興達工安文件資源庫</h1>
    <p>請搜尋並下載最新版本文件</p>
</header>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="搜尋文件 (中文/英文)...">
</div>

<div class="grid" id="fileGrid">
    <p style="text-align: center; grid-column: 1/-1;">正在載入文件列表...</p>
</div>

<div class="no-result" id="noResult">查無符合的文件</div>

<footer>By C.F.M </footer>

<script>
// 1. 從 data.json 獲取資料
fetch('data.json')
    .then(response => {
        if (!response.ok) throw new Error('無法讀取 data.json');
        return response.json();
    })
    .then(data => {
        const container = document.getElementById('fileGrid');
        container.innerHTML = ''; 

        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            // 注意：這裡加入了 preview-box 結構，並讀取 item.image
            card.innerHTML = `
                <div>
                    <div class="file-icon">📄</div>
                    <div class="file-name">
                        ${item.name}
                        <div class="preview-box">
                            <img src="${item.image || 'https://via.placeholder.com/200x280?text=No+Preview'}" alt="預覽">
                        </div>
                    </div>
                </div>
                <div>
                    <a href="${item.file}" download class="download-btn">下載文件</a>
                    <div class="update-tag">最後更新：${item.date}</div>
                </div>
            `;
            container.appendChild(card);
        });
        initSearch();
    })
    .catch(error => {
        document.getElementById('fileGrid').innerHTML = '<p style="color:red; text-align:center; grid-column:1/-1;">資料載入出錯，請檢查檔案路徑。</p>';
    });

function initSearch() {
    const searchInput = document.getElementById("searchInput");
    const noResult = document.getElementById("noResult");

    searchInput.addEventListener("keyup", function () {
        const keyword = this.value.toLowerCase(); 
        const cards = document.querySelectorAll(".card");
        let visibleCount = 0;

        cards.forEach(card => {
            const fileName = card.querySelector(".file-name").innerText.toLowerCase();
            if (fileName.includes(keyword)) {
                card.style.display = "flex";
                visibleCount++;
            } else {
                card.style.display = "none";
            }
        });
        noResult.style.display = visibleCount === 0 ? "block" : "none";
    });
}
</script>

</body>
</html>
