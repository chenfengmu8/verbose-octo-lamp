<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>興達工安文件資源庫 | 官方發布</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-gradient: linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-weight: 700;
            color: #1e293b;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .search-box {
            margin-bottom: 40px;
        }

        .search-box input {
            width: 320px;
            padding: 12px 18px;
            border-radius: 30px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.1);
        }

        .file-icon {
            font-size: 48px;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .file-name {
            font-size: 1.1rem;
            color: #334155;
            font-weight: 500;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .download-btn {
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 12px 0;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: 0.3s;
            display: block;
        }

        .download-btn:hover {
            background: #1d4ed8;
        }

        .update-tag {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 15px;
        }

        .no-result {
            text-align: center;
            color: #64748b;
            margin-top: 30px;
            display: none;
        }

        footer {
            margin-top: auto;
            padding: 40px 0;
            color: #94a3b8;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <h1>興達工安文件資源庫</h1>
    <p>請搜尋並下載最新版本文件</p>
    <input 
  type="text" 
  id="searchInput" 
  placeholder="搜尋表單名稱..." 
  style="
    width: 100%;
    max-width: 500px;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid #cbd5e1;
    font-size: 16px;
    margin-top: 20px;
  "
>
</header>

<div class="grid" id="fileGrid">
    <p style="text-align: center; grid-column: 1/-1;">正在載入文件列表...</p>
</div>

<div class="no-result" id="noResult">查無符合的文件</div>

<footer>By C.F.M | 興達發電廠</footer>

<script>
let allData = [];

fetch('data.json')
  .then(response => response.json())
  .then(data => {
    allData = data;
    renderCards(data);
  });

function renderCards(data) {
  const container = document.getElementById('formList');
  container.innerHTML = '';

  data.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <div class="file-icon">📄</div>
      <div class="file-name">${item.name}</div>
      <a href="${item.file}" target="_blank" class="download-btn">下載文件</a>
      <div class="update-tag">
        版本：${item.version} ｜ 更新：${item.date}
      </div>
    `;

    container.appendChild(card);
  });
}

document.getElementById('searchInput').addEventListener('input', function() {
  const keyword = this.value.trim();

  if (keyword === '') {
    renderCards(allData);
    return;
  }

  const filtered = allData.filter(item =>
    item.name.includes(keyword) ||   // 中文搜尋關鍵
    item.version.includes(keyword) ||
    item.date.includes(keyword)
  );

  renderCards(filtered);
});
</script>

</body>
</html>
