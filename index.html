<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:title" content="私人文件庫"> <meta property="og:description" content="私人內容，請勿分享">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>興達工安文件資源庫</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --bg-gradient: linear-gradient(135deg, #e5e7eb 0%, #d1d5db 100%);
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-weight: 700;
            color: #1e293b;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .search-box {
            margin-bottom: 40px;
        }

        .search-box input {
            width: 320px;
            padding: 12px 18px;
            border-radius: 30px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
            outline: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 24px;
            text-align: center;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.1);
        }

        .file-icon {
            font-size: 48px;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .file-name {
            font-size: 1.1rem;
            color: #334155;
            font-weight: 500;
            margin-bottom: 15px;
            line-height: 1.5;
            word-break: break-all;
        }

        .download-btn {
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 12px 0;
            border-radius: 12px;
            font-size: 0.9rem;
            transition: 0.3s;
            display: block;
        }

        .download-btn:hover {
            background: #1d4ed8;
        }

        .update-tag {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 15px;
        }

        .no-result {
            text-align: center;
            color: #64748b;
            margin-top: 30px;
            display: none;
            font-size: 1.2rem;
        }

        footer {
            margin-top: auto;
            padding: 40px 0;
            color: #94a3b8;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<header>
    <h1>興達工安文件資源庫</h1>
    <p>請搜尋並下載最新版本文件</p>
</header>

<div class="search-box">
    <input type="text" id="searchInput" placeholder="搜尋文件 (中文/英文)...">
</div>

<div class="grid" id="fileGrid">
    <p style="text-align: center; grid-column: 1/-1;">正在載入文件列表...</p>
</div>

<div class="no-result" id="noResult">查無符合的文件</div>

<footer>By C.F.M </footer>

<script>
// 1. 從 data.json 獲取資料
fetch('data.json')
    .then(response => {
        if (!response.ok) throw new Error('無法讀取 data.json');
        return response.json();
    })
    .then(data => {
        const container = document.getElementById('fileGrid');
        container.innerHTML = ''; // 清除「載入中」文字

        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div>
                    <div class="file-icon">📄</div>
                    <div class="file-name">${item.name}</div>
                </div>
                <div>
                    <a href="${item.file}" download class="download-btn">下載文件</a>
                    <div class="update-tag">最後更新：${item.date}</div>
                </div>
            `;
            container.appendChild(card);
        });

        // 載入完成後開啟搜尋監聽
        initSearch();
    })
    .catch(error => {
        console.error('Error:', error);
        document.getElementById('fileGrid').innerHTML = '<p style="color:red; text-align:center; grid-column:1/-1;">資料載入出錯，請檢查 data.json 格式或路徑。</p>';
    });

// 2. 搜尋功能邏輯 (支援中文與英文大小寫)
function initSearch() {
    const searchInput = document.getElementById("searchInput");
    const noResult = document.getElementById("noResult");

    searchInput.addEventListener("keyup", function () {
        // 將關鍵字轉為小寫，確保搜尋英文時不分大小寫
        const keyword = this.value.toLowerCase(); 
        const cards = document.querySelectorAll(".card");
        let visibleCount = 0;

        cards.forEach(card => {
            // 將檔名也轉為小寫進行比對
            const fileName = card.querySelector(".file-name").innerText.toLowerCase();
            
            // 比對關鍵字是否包含在檔名中
            if (fileName.includes(keyword)) {
                card.style.display = "flex";
                visibleCount++;
            } else {
                card.style.display = "none";
            }
        });

        noResult.style.display = visibleCount === 0 ? "block" : "none";
    });
}
</script>

</body>
</html>
